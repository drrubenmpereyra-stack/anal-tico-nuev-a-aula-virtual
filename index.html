<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Analíticos - Clínica de la Convergencia</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #fff; padding: 40px; border: 1px solid #ccc; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom: 30px; }
        .header img { width: 120px; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        table, th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
        .buttons { margin-top: 30px; text-align: center; }
        button { padding: 12px 25px; cursor: pointer; margin: 5px; background: #333; color: #fff; border: none; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container" id="pdf-content">
    <div class="header">
        <div>
            <h2>PROGRAMA DE FORMACIÓN PARA PROFESIONALES</h2>
            <h3>Clínica de la Convergencia</h3>
            <p>Director: Dr. y Mgter. Rubén M. Pereyra</p>
        </div>
        <img src="logo.jpg" alt="Logo">
    </div>

    <div class="form-group">
        <label><strong>Seleccione Alumno:</strong></label>
        <select id="select-alumno" onchange="cargarDatosAlumno()">
            <option value="">Seleccione un alumno...</option>
        </select>
    </div>

    <div>
        <p><strong>DNI N°:</strong> <span id="dni-val">-</span></p>
        <p><strong>Legajo:</strong> <span id="legajo-val">-</span></p>
        <p><strong>Profesión:</strong> <span id="profesion-val">-</span></p>
    </div>

    <h3>Asistencia</h3>
    <table id="tabla-asistencia"><tr><th>Encuentro</th><th>Estado</th><th>Fecha</th></tr></table>
    <p><strong>% Asistencia:</strong> <span id="porcentaje-asistencia">0</span>%</p>

    <h3>Calificaciones</h3>
    <table id="tabla-calificaciones"><tr><th>Test N°</th><th>Nota</th></tr></table>
    <p><strong>Promedio General:</strong> <span id="promedio-general">0</span></p>

    <div id="formula-legal" style="margin-top: 40px; font-size: 0.9em; font-style: italic;"></div>
    
    <div style="margin-top: 50px; text-align: right;">
        <img src="sello.jpg" style="width: 120px; display: block; margin-left: auto;">
    </div>
</div>

<div class="buttons">
    <button onclick="generarPDF()">Generar PDF</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD47_2UtWLFI_VRVvvXVAqn4zZzZ4d1ggo",
        authDomain: "av-clinica-convergencia.firebaseapp.com",
        projectId: "av-clinica-convergencia",
        storageBucket: "av-clinica-convergencia.firebasestorage.app",
        appId: "1:939404425675:web:8cfae157099efabd741e4e"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Inicialización de alumnos
    document.addEventListener("DOMContentLoaded", async () => {
        console.log("Cargando alumnos...");
        try {
            const snap = await db.collection("participantes").get();
            const sel = document.getElementById("select-alumno");
            snap.forEach(doc => {
                const data = doc.data();
                const opt = document.createElement("option");
                opt.value = doc.id;
                opt.textContent = data.nombre || "Sin nombre";
                sel.appendChild(opt);
            });
            console.log("Carga completada.");
        } catch (e) {
            console.error("Error al conectar:", e);
        }
    });

    async function cargarDatosAlumno() {
        const sel = document.getElementById("select-alumno");
        const nombreCompleto = sel.options[sel.selectedIndex].text;
        const id = sel.value;
        if (!id) return;
        
        // Carga participante
        const doc = await db.collection("participantes").doc(id).get();
        const data = doc.data();
        document.getElementById("dni-val").textContent = data.dni || data.DNI || "-";
        document.getElementById("legajo-val").textContent = data.legajo || data.Legajo || "-";
        document.getElementById("profesion-val").textContent = data.profesion || "-";

        // Asistencia y Calificaciones
        const nombreUpper = nombreCompleto.toUpperCase();
        
        // Asistencia
        const tablaAsis = document.getElementById("tabla-asistencia");
        tablaAsis.innerHTML = "<tr><th>Encuentro</th><th>Estado</th><th>Fecha</th></tr>";
        const asisSnap = await db.collection("asistencia").get();
        let pres = 0, total = 0;
        asisSnap.forEach(d => {
            const r = d.data();
            if (r.nombreEstudiante && r.nombreEstudiante.toUpperCase() === nombreUpper) {
                tablaAsis.innerHTML += `<tr><td>${r.encuentro||'-'}</td><td>${r.estado||'-'}</td><td>${r.fecha||'-'}</td></tr>`;
                if(r.estado && r.estado.toLowerCase() === "presente") pres++;
                total++;
            }
        });
        document.getElementById("porcentaje-asistencia").textContent = total > 0 ? ((pres / total) * 100).toFixed(0) : 0;

        // Notas
        const tablaCal = document.getElementById("tabla-calificaciones");
        tablaCal.innerHTML = "<tr><th>Test N°</th><th>Nota</th></tr>";
        let suma = 0, cant = 0;
        const resSnap = await db.collection("resultados_test").get();
        resSnap.forEach(d => {
            const r = d.data();
            if (r.nombre && r.nombre.toUpperCase() === nombreUpper) {
                tablaCal.innerHTML += `<tr><td>${r.Test_numero || '-'}</td><td>${r.nota || '0'}</td></tr>`;
                suma += Number(r.nota) || 0;
                cant++;
            }
        });
        document.getElementById("promedio-general").textContent = cant > 0 ? (suma / cant).toFixed(2) : 0;
        
        document.getElementById("formula-legal").textContent = `REGISTRO ACADÉMICO: La Dirección Académica de la "Clínica de la Convergencia" certifica que ${nombreCompleto}, matriculado/a bajo el N° ${data.legajo || data.Legajo || '-'}, ha cursado, rendido y aprobado los módulos correspondientes... Fecha: ${new Date().toLocaleDateString('es-AR')}`;
    }

    function generarPDF() { html2pdf().from(document.getElementById('pdf-content')).save(); }
</script>
</body>
</html>
